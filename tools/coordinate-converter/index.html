<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WGS-84 坐标转换</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="eo-bar">
      <a class="eo-brand" href="../../index.html" aria-label="返回 E.O图文首页"><strong>E.O</strong><span>图文</span></a>
      <nav aria-label="工具导航">
        <a href="../../tools.html">返回工具目录</a>
        <a href="../../about.html">关于</a>
      </nav>
    </header>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="intro">
          <p class="eyebrow">WGS-84 / GCJ-02 / BD-09</p>
          <h1 id="app-title">中国地图坐标转换</h1>
          <p>
            输入或粘贴经纬度，自动判断经纬顺序和格式、是否位于中国境内，并转换为中国地图可用坐标，任选一种地图即可显示正确位置。
          </p>
        </div>

        <div class="input-panel">
          <label for="coordinate-input">WGS-84 坐标</label>
          <textarea
            id="coordinate-input"
            spellcheck="false"
            placeholder="例如：118.544367, 40.410283&#10;或：N 40°24.617' / E 118°32.662'&#10;或：N40.410283 E118.544367"
          ></textarea>
          <div class="actions">
            <button id="convert-button" class="primary" type="button">转换</button>
            <button id="sample-button" type="button">示例</button>
            <button id="clear-button" type="button">清空</button>
          </div>
        </div>
      </section>

      <section class="results" aria-live="polite">
        <div id="status" class="status">等待输入坐标</div>

        <div class="result-grid">
          <article class="result-card">
            <div>
              <h2>识别为 WGS-84</h2>
              <p id="wgs-result">-</p>
            </div>
            <button class="copy-button" data-copy="wgs" type="button" aria-label="复制 WGS-84 坐标">复制</button>
          </article>

          <article class="result-card">
            <div>
              <h2>GCJ-02</h2>
              <p id="gcj-result">-</p>
            </div>
            <button class="copy-button" data-copy="gcj" type="button" aria-label="复制 GCJ-02 坐标">复制</button>
          </article>

          <article class="result-card">
            <div>
              <h2>BD-09</h2>
              <p id="bd-result">-</p>
            </div>
            <button class="copy-button" data-copy="bd" type="button" aria-label="复制 BD-09 坐标">复制</button>
          </article>
        </div>

        <div class="map-settings" aria-label="苹果地图模式">
          <span>苹果地图</span>
          <label>
            <input type="radio" name="apple-map-mode" value="china" checked />
            中国本地网络
          </label>
          <label>
            <input type="radio" name="apple-map-mode" value="global" />
            代理/境外网络
          </label>
        </div>

        <div class="map-actions">
          <a id="apple-link" class="map-button disabled" href="#" target="_blank" rel="noreferrer">苹果地图</a>
          <a id="amap-link" class="map-button disabled" href="#" target="_blank" rel="noreferrer">高德地图</a>
          <a id="baidu-link" class="map-button disabled" href="#" target="_blank" rel="noreferrer">百度地图</a>
          <a id="google-link" class="map-button disabled" href="#" target="_blank" rel="noreferrer">谷歌地图</a>
        </div>

        <div class="details">
          <h2>判断信息</h2>
          <ul id="notes"></ul>
        </div>
      </section>

      <footer class="credit">本工具由 Olan 与 Codex 共同构思、设计与创作。<br><a href="../../index.html">E.O图文</a> · 摄影、旅行、阅读与工具</footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
